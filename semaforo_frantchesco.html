<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ranking — Rede Frantchesco</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0A0A0A;--bg2:#141414;--bg3:#1E1E1E;--border:#252525;
  --gold:#C4A265;--gold2:#D4B87A;--gold3:#8B6F3E;
  --verde:#0D3D2E;--verde2:#0F4D39;--verde3:#1A6B4A;
  --white:#F0EDE8;--gray:#6B6560;--gray2:#9A9590;
  --green:#27AE60;--yellow:#F1C40F;--orange:#E67E22;--red:#E74C3C;--blue:#4285F4;
}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:999;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:.85rem 1.1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.brand{font-family:Syne,sans-serif;font-size:1.15rem;font-weight:800;color:var(--gold);letter-spacing:-.02em;}
.brand-sub{font-size:.52rem;color:var(--gray);letter-spacing:.15em;text-transform:uppercase;margin-top:.1rem;}
.loja-bar{display:flex;gap:0;border:1px solid var(--border);margin:.85rem 1rem;}
.loja-btn{flex:1;background:transparent;border:none;color:var(--gray);font-family:Syne,sans-serif;font-size:.72rem;font-weight:600;padding:.6rem;cursor:pointer;transition:all .15s;letter-spacing:.06em;text-transform:uppercase;}
.loja-btn.active{background:var(--verde);color:var(--white);}
.content{padding:.85rem 1rem;max-width:560px;margin:0 auto;}
.topo-mes{background:var(--bg2);border:1px solid var(--border);border-top:3px solid var(--gold);padding:1rem 1.1rem;margin-bottom:1rem;}
.topo-label{font-size:.58rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gray);margin-bottom:.5rem;}
.topo-body{display:flex;align-items:flex-start;gap:.85rem;}
.topo-pos{font-family:Syne,sans-serif;font-size:2.5rem;font-weight:800;color:var(--gold);opacity:.2;line-height:1;flex-shrink:0;}
.topo-info{flex:1;}
.topo-nome{font-family:Syne,sans-serif;font-size:1.15rem;font-weight:800;color:var(--gold);line-height:1.1;}
.topo-nivel{font-size:.65rem;margin-top:.2rem;color:var(--gray2);}
.topo-nums{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;margin-top:.65rem;}
.topo-num{background:var(--bg3);padding:.4rem .65rem;}
.topo-num-lbl{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);}
.topo-num-val{font-family:Syne,sans-serif;font-size:.95rem;font-weight:700;margin-top:.1rem;}
.sec-titulo{font-size:.58rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gray);margin-bottom:.65rem;}
.rank-item{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--border);padding:.75rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none;}
.rank-item:active{opacity:.8;}
.rank-item.pos1{border-left-color:#FFD700;}
.rank-item.pos2{border-left-color:#C0C0C0;}
.rank-item.pos3{border-left-color:#CD7F32;}
.rank-num{font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800;color:var(--gray);min-width:28px;text-align:center;opacity:.3;line-height:1;}
.pos1 .rank-num{color:#FFD700;opacity:1;}
.pos2 .rank-num{color:#C0C0C0;opacity:1;}
.pos3 .rank-num{color:#CD7F32;opacity:1;}
.rank-sema{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rank-body{flex:1;min-width:0;}
.rank-nome{font-family:Syne,sans-serif;font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-sub{font-size:.6rem;color:var(--gray2);margin-top:.1rem;}
.rank-right{text-align:right;flex-shrink:0;}
.rank-nivel{font-size:.72rem;font-weight:700;}
.rank-nums{font-size:.6rem;color:var(--gray);margin-top:.1rem;}
.rank-chevron{font-size:.8rem;color:var(--gray);margin-left:.15rem;}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal-sheet{background:var(--bg2);border-top:1px solid var(--border);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;border-radius:16px 16px 0 0;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:.65rem auto .75rem;}
.modal-header{padding:.25rem 1.1rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;}
.modal-nome{font-family:Syne,sans-serif;font-size:1.1rem;font-weight:800;}
.modal-fechar{background:none;border:none;color:var(--gray);font-size:1.2rem;cursor:pointer;padding:.25rem;line-height:1;}
.modal-body{padding:0 1.1rem 2rem;}
.nivel-strip{display:flex;align-items:center;gap:.85rem;border:1px solid var(--border);padding:.85rem 1rem;margin-bottom:1rem;}
.acum-box{background:var(--bg3);border:1px solid var(--border);padding:.85rem 1rem;margin-bottom:.85rem;}
.acum-titulo{font-size:.58rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.65rem;}
.acum-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.prog-row{display:flex;justify-content:space-between;font-size:.6rem;color:var(--gray);margin-bottom:.25rem;}
.prog-bar{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:.65rem;}
.prog-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.metas-strip{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.65rem;}
.meta-tag{font-size:.58rem;font-weight:700;padding:.2rem .55rem;border-radius:2px;border:1px solid;letter-spacing:.04em;text-transform:uppercase;}
.semana-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--border);padding:.75rem .9rem;margin-bottom:.5rem;}
.semana-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.semana-label{font-family:Syne,sans-serif;font-size:.72rem;font-weight:700;}
.semana-sema{width:9px;height:9px;border-radius:50%;}
.semana-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.35rem;}
.semana-kpi{background:var(--bg2);padding:.4rem .5rem;}
.semana-kpi-lbl{font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--gray);}
.semana-kpi-val{font-family:Syne,sans-serif;font-size:.88rem;font-weight:700;margin-top:.1rem;}
.footer{text-align:center;font-size:.6rem;color:var(--gray);padding:2rem 0 1.5rem;}
@media(max-width:380px){.semana-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div id="loading">
  <div style="font-family:Syne,sans-serif;font-size:2rem;font-weight:800;color:var(--gold);letter-spacing:-.03em;">NaMao</div>
  <div class="spinner" style="margin-top:.5rem;"></div>
  <div style="font-family:Syne,sans-serif;font-size:.68rem;color:var(--gray);letter-spacing:.15em;text-transform:uppercase;margin-top:.5rem;">Carregando ranking...</div>
</div>

<div id="app" style="display:none;">
  <div class="header">
    <div>
      <div class="brand">NaMao</div>
      <div class="brand-sub">Ranking Semanal</div>
    </div>
    <div id="hdr-badge" style="font-size:.62rem;font-weight:700;font-family:Syne,sans-serif;padding:.25rem .65rem;border:1px solid var(--gold3);color:var(--gold);">FB Matriz</div>
  </div>
  <div class="loja-bar">
    <button class="loja-btn active" id="btn-loja-matriz" onclick="setLoja('matriz',this)">FB Matriz</button>
    <button class="loja-btn" id="btn-loja-fb2" onclick="setLoja('fb2',this)">FB 2</button>
  </div>
  <div class="content">
    <div class="topo-mes" id="topo-card"></div>
    <div class="sec-titulo">Ranking Acumulado do Mes</div>
    <div id="rank-list"></div>
    <div class="footer" id="footer-txt"></div>
  </div>
</div>

<div id="modal-overlay" onclick="fecharModal(event)">
  <div id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-nome" id="modal-nome">-</div>
        <div style="font-size:.62rem;color:var(--gray2);margin-top:.2rem;" id="modal-sub">-</div>
      </div>
      <button class="modal-fechar" onclick="fecharModalBtn()">x</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
var SHEET_ID = '1ZAzI1unL5MMCd6IIYDgSmbjAgpetXJIRw2egAYXNjqY';
var lojaAtiva = 'matriz';
var DATA = {matriz:[],fb2:[]};

function fetchSheet(id, aba){
  return new Promise(function(resolve,reject){
    var cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    var t=setTimeout(function(){delete window[cb];reject(new Error('Timeout'));},15000);
    window[cb]=function(data){
      clearTimeout(t);delete window[cb];
      try{
        var cols=data.table.cols.map(function(c){return c.label||c.id||'';});
        var rows=data.table.rows.map(function(r){
          var o={};cols.forEach(function(h,i){o[h]=(r.c&&r.c[i]&&r.c[i].v!==null)?r.c[i].v:'';});return o;
        });
        resolve(rows);
      }catch(e){reject(e);}
    };
    var s=document.createElement('script');
    s.src='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=responseHandler:'+cb+'&sheet='+encodeURIComponent(aba);
    s.onerror=function(){clearTimeout(t);delete window[cb];reject(new Error('Erro rede'));};
    document.head.appendChild(s);
  });
}

function getSema(val,meta,semanasD){
  if(!meta)return{hex:'#444',label:'-',pct:0};
  var esp=meta/4*semanasD,pct=esp>0?Math.round(val/esp*100):0;
  if(pct>=95)return{hex:'#27AE60',label:'No ritmo',pct:pct};
  if(pct>=50)return{hex:'#F1C40F',label:'Atencao',pct:pct};
  return{hex:'#E74C3C',label:'Abaixo',pct:pct};
}

var NIVEIS=[
  {key:'Diamante',icon:'D',cor:'#B9F2FF',desc:'Performance excepcional'},
  {key:'Ouro',icon:'O',cor:'#FFD700',desc:'Excelente desempenho'},
  {key:'Prata',icon:'S',cor:'#C0C0C0',desc:'Bom mes, falta pouco'},
  {key:'Bronze',icon:'B',cor:'#CD7F32',desc:'Meta minima atingida'},
];

function getNivel(prod,ext,bp,pp,op,dp,be,pe,oe,de){
  var np=!bp?null:prod>=dp?'Diamante':prod>=op?'Ouro':prod>=pp?'Prata':prod>=bp?'Bronze':null;
  var ne=!be?null:ext>=de?'Diamante':ext>=oe?'Ouro':ext>=pe?'Prata':ext>=be?'Bronze':null;
  var ord={Diamante:4,Ouro:3,Prata:2,Bronze:1};
  return(ord[np]||0)>=(ord[ne]||0)?np:ne;
}
function nc(nivel){return NIVEIS.find(function(n){return n.key===nivel;})||{icon:'-',cor:'var(--gray)',desc:'Sem nivel'};}

function processar(rows){
  var map={};
  rows.forEach(function(r){
    var keys=Object.keys(r);
    var nome=String(r[keys[0]]||'').trim();if(!nome||nome.length<2)return;
    var wpp=String(r[keys[1]]||'').replace(/\D/g,'');
    var semana=String(r[keys[2]]||'').trim();
    var srv=parseInt(r[keys[3]])||0,cli=parseInt(r[keys[4]])||0,prd=parseInt(r[keys[5]])||0,ext=parseInt(r[keys[6]])||0;
    var bp=parseInt(r[keys[7]])||0,pp=parseInt(r[keys[8]])||0,op=parseInt(r[keys[9]])||0,dp=parseInt(r[keys[10]])||0;
    var be=parseInt(r[keys[11]])||0,pe=parseInt(r[keys[12]])||0,oe=parseInt(r[keys[13]])||0,de=parseInt(r[keys[14]])||0;
    if(!map[nome])map[nome]={nome:nome,wpp:wpp,srv:0,cli:0,prd:0,ext:0,bp:0,pp:0,op:0,dp:0,be:0,pe:0,oe:0,de:0,semanas:{}};
    var p=map[nome];
    p.semanas[semana]={srv:srv,cli:cli,prd:prd,ext:ext};
    p.srv+=srv;p.cli+=cli;p.prd+=prd;p.ext+=ext;
    if(bp>p.bp){p.bp=bp;p.pp=pp;p.op=op;p.dp=dp;}
    if(be>p.be){p.be=be;p.pe=pe;p.oe=oe;p.de=de;}
  });
  var profs=Object.values(map).filter(function(p){return p.srv>0||p.prd>0||p.ext>0;});
  var mg={bp:0,pp:0,op:0,dp:0,be:0,pe:0,oe:0,de:0};
  profs.forEach(function(p){
    if(p.bp>mg.bp){mg.bp=p.bp;mg.pp=p.pp;mg.op=p.op;mg.dp=p.dp;}
    if(p.be>mg.be){mg.be=p.be;mg.pe=p.pe;mg.oe=p.oe;mg.de=p.de;}
  });
  profs.forEach(function(p){
    if(!p.bp){p.bp=mg.bp;p.pp=mg.pp;p.op=mg.op;p.dp=mg.dp;}
    if(!p.be){p.be=mg.be;p.pe=mg.pe;p.oe=mg.oe;p.de=mg.de;}
  });
  return profs;
}

window.addEventListener('load',function(){
  Promise.all([fetchSheet(SHEET_ID,'FB_MATRIZ'),fetchSheet(SHEET_ID,'FB2')])
    .then(function(res){
      DATA.matriz=processar(res[0]);
      DATA.fb2=processar(res[1]);
      document.getElementById('loading').style.display='none';
      document.getElementById('app').style.display='block';
      renderTudo();
    }).catch(function(e){
      document.getElementById('loading').innerHTML='<div style="font-family:Syne,sans-serif;font-size:.8rem;color:#E74C3C;text-align:center;padding:2rem;">Erro ao carregar.<br>'+e.message+'</div>';
    });
});

function setLoja(loja,btn){
  lojaAtiva=loja;
  document.querySelectorAll('.loja-btn').forEach(function(b){b.classList.toggle('active',b===btn);});
  document.getElementById('hdr-badge').textContent=loja==='fb2'?'FB 2':'FB Matriz';
  renderTudo();
}

function renderTudo(){
  var profs=DATA[lojaAtiva];
  if(!profs||!profs.length){
    document.getElementById('rank-list').innerHTML='<div style="text-align:center;padding:3rem;color:var(--gray);font-size:.78rem;">Sem dados para esta unidade.</div>';
    document.getElementById('topo-card').innerHTML='';return;
  }
  var sorted=profs.slice().sort(function(a,b){return((b.prd*2)+b.ext)-((a.prd*2)+a.ext);});
  renderTopo(sorted[0]);
  var html=sorted.map(function(p,i){
    var pos=i+1;
    var semanasD=Math.max(Object.keys(p.semanas).length,1);
    var sp=getSema(p.prd,p.bp,semanasD),se=getSema(p.ext,p.be,semanasD);
    var pior=(sp.pct<=se.pct)?sp:se;
    var nivel=getNivel(p.prd,p.ext,p.bp,p.pp,p.op,p.dp,p.be,p.pe,p.oe,p.de);
    var ncfg=nc(nivel);
    var medal=pos===1?'🥇 ':pos===2?'🥈 ':pos===3?'🥉 ':'';
    var cls=pos===1?'pos1':pos===2?'pos2':pos===3?'pos3':'';
    return '<div class="rank-item '+cls+'" onclick="abrirModal(\''+encodeURIComponent(p.nome)+'\')">'+
      '<div class="rank-num">'+pos+'</div>'+
      '<div class="rank-sema" style="background:'+pior.hex+';box-shadow:0 0 7px '+pior.hex+'88;"></div>'+
      '<div class="rank-body">'+
        '<div class="rank-nome">'+medal+p.nome+'</div>'+
        '<div class="rank-sub">Prod: '+p.prd+' · Extras: '+p.ext+' · Clientes: '+p.cli+'</div>'+
      '</div>'+
      '<div class="rank-right">'+
        '<div class="rank-nivel" style="color:'+ncfg.cor+';">'+(nivel||'—')+'</div>'+
        '<div class="rank-nums">'+p.prd+'+'+p.ext+'</div>'+
      '</div>'+
      '<div class="rank-chevron">›</div>'+
    '</div>';
  }).join('');
  document.getElementById('rank-list').innerHTML=html;
  document.getElementById('footer-txt').textContent='Atualizado '+new Date().toLocaleDateString('pt-BR')+' as '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' · Toque para ver detalhes';
}

function renderTopo(p){
  if(!p){document.getElementById('topo-card').innerHTML='';return;}
  var nivel=getNivel(p.prd,p.ext,p.bp,p.pp,p.op,p.dp,p.be,p.pe,p.oe,p.de);
  var ncfg=nc(nivel);
  var icons={Diamante:'💎',Ouro:'🏆',Prata:'🥈',Bronze:'🥉'};
  var icon=icons[nivel]||'🏆';
  document.getElementById('topo-card').innerHTML=
    '<div class="topo-label">🏆 Lider do Mes</div>'+
    '<div class="topo-body">'+
      '<div class="topo-pos">1</div>'+
      '<div class="topo-info">'+
        '<div class="topo-nome">'+icon+' '+p.nome+'</div>'+
        '<div class="topo-nivel" style="color:'+ncfg.cor+';">'+(nivel||'Sem nivel')+' · '+ncfg.desc+'</div>'+
        '<div class="topo-nums">'+
          '<div class="topo-num"><div class="topo-num-lbl">Produtos</div><div class="topo-num-val" style="color:var(--gold);">'+p.prd+'</div></div>'+
          '<div class="topo-num"><div class="topo-num-lbl">Extras</div><div class="topo-num-val" style="color:var(--blue);">'+p.ext+'</div></div>'+
          '<div class="topo-num"><div class="topo-num-lbl">Servicos</div><div class="topo-num-val">'+p.srv+'</div></div>'+
          '<div class="topo-num"><div class="topo-num-lbl">Clientes</div><div class="topo-num-val">'+p.cli+'</div></div>'+
        '</div>'+
      '</div>'+
    '</div>';
}

function abrirModal(nomeEnc){
  var nome=decodeURIComponent(nomeEnc);
  var p=DATA[lojaAtiva].find(function(x){return x.nome===nome;});
  if(!p)return;
  document.getElementById('modal-nome').textContent=p.nome;
  document.getElementById('modal-sub').textContent=(lojaAtiva==='fb2'?'FB 2':'FB Matriz')+' · Acumulado do mes';
  var nivel=getNivel(p.prd,p.ext,p.bp,p.pp,p.op,p.dp,p.be,p.pe,p.oe,p.de);
  var ncfg=nc(nivel);
  var semanasD=Math.max(Object.keys(p.semanas).length,1);
  var icons={Diamante:'💎',Ouro:'🏆',Prata:'🥈',Bronze:'🥉'};
  var html='';

  // Nivel
  html+='<div class="nivel-strip" style="border-left:3px solid '+ncfg.cor+';background:'+ncfg.cor+'0A;">'+
    '<div style="font-size:1.8rem;flex-shrink:0;">'+(icons[nivel]||'—')+'</div>'+
    '<div><div style="font-family:Syne,sans-serif;font-size:1rem;font-weight:800;color:'+ncfg.cor+';">'+(nivel||'Sem nivel')+'</div>'+
    '<div style="font-size:.65rem;color:var(--gray2);margin-top:.15rem;">'+ncfg.desc+'</div></div>'+
  '</div>';

  // Acumulado
  html+='<div class="acum-box">'+
    '<div class="acum-titulo">Acumulado do Mes</div>'+
    '<div class="acum-grid">'+
      '<div><div style="font-size:.58rem;color:var(--gray);">Servicos</div><div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:700;">'+p.srv+'</div></div>'+
      '<div><div style="font-size:.58rem;color:var(--gray);">Clientes</div><div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:700;">'+p.cli+'</div></div>'+
      '<div><div style="font-size:.58rem;color:var(--gray);">Produtos</div><div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold);">'+p.prd+'</div></div>'+
      '<div><div style="font-size:.58rem;color:var(--gray);">Extras</div><div style="font-family:Syne,sans-serif;font-size:1.1rem;font-weight:700;color:var(--blue);">'+p.ext+'</div></div>'+
    '</div>';

  if(p.bp){
    var sp=getSema(p.prd,p.bp,semanasD),se=getSema(p.ext,p.be,semanasD);
    var pctP=Math.min(100,Math.round(p.prd/p.bp*100));
    var pctE=Math.min(100,Math.round(p.ext/p.be*100));
    html+='<div style="margin-top:.85rem;">'+
      '<div class="prog-row"><span>Produtos</span><span>'+p.prd+'/'+p.bp+' ('+pctP+'%)</span></div>'+
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pctP+'%;background:'+sp.hex+';"></div></div>'+
      '<div class="prog-row"><span>Extras</span><span>'+p.ext+'/'+p.be+' ('+pctE+'%)</span></div>'+
      '<div class="prog-bar"><div class="prog-fill" style="width:'+pctE+'%;background:'+se.hex+';"></div></div>'+
    '</div>';
    html+='<div class="metas-strip">';
    [['Bronze',p.bp,p.be,'#CD7F32'],['Prata',p.pp,p.pe,'#C0C0C0'],['Ouro',p.op,p.oe,'#FFD700'],['Diamante',p.dp,p.de,'#B9F2FF']].forEach(function(m){
      if(!m[1])return;
      var ok=p.prd>=m[1]&&p.ext>=m[2];
      html+='<div class="meta-tag" style="color:'+m[3]+';border-color:'+m[3]+(ok?';background:'+m[3]+'22':'')+';">'+(ok?'V ':'')+m[0]+': '+m[1]+'P/'+m[2]+'E</div>';
    });
    html+='</div>';
  }
  html+='</div>';

  // Semanas
  html+='<div style="margin-top:.85rem;"><div class="sec-titulo">Por Semana</div>';
  ['Semana 1','Semana 2','Semana 3','Semana 4'].forEach(function(sk,i){
    var sw=p.semanas[sk];
    var tem=sw&&(sw.srv>0||sw.prd>0||sw.ext>0);
    var sp2=tem?getSema(sw.prd,p.bp,i+1):{hex:'#333',pct:0};
    var se2=tem?getSema(sw.ext,p.be,i+1):{hex:'#333',pct:0};
    var pior2=(sp2.pct<=se2.pct)?sp2:se2;
    html+='<div class="semana-card" style="'+(tem?'border-left-color:'+pior2.hex+';':'opacity:.4;')+'">';
    html+='<div class="semana-hd">'+
      '<div class="semana-label">'+sk+'</div>'+
      (tem?'<div class="semana-sema" style="background:'+pior2.hex+';box-shadow:0 0 5px '+pior2.hex+'88;"></div>':'<div style="font-size:.58rem;color:var(--gray);">Sem registro</div>')+
    '</div>';
    if(tem){
      html+='<div class="semana-grid">'+
        '<div class="semana-kpi"><div class="semana-kpi-lbl">Servicos</div><div class="semana-kpi-val">'+sw.srv+'</div></div>'+
        '<div class="semana-kpi"><div class="semana-kpi-lbl">Clientes</div><div class="semana-kpi-val">'+sw.cli+'</div></div>'+
        '<div class="semana-kpi"><div class="semana-kpi-lbl">Produtos</div><div class="semana-kpi-val" style="color:'+sp2.hex+';">'+sw.prd+'</div></div>'+
        '<div class="semana-kpi"><div class="semana-kpi-lbl">Extras</div><div class="semana-kpi-val" style="color:'+se2.hex+';">'+sw.ext+'</div></div>'+
      '</div>';
    }
    html+='</div>';
  });
  html+='</div>';

  document.getElementById('modal-body').innerHTML=html;
  setTimeout(function(){
    document.querySelectorAll('.prog-fill').forEach(function(el){var w=el.style.width;el.style.width='0';setTimeout(function(){el.style.width=w;},30);});
  },50);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function fecharModal(e){if(e.target===document.getElementById('modal-overlay'))fecharModalBtn();}
function fecharModalBtn(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';}
var _ts=0;
document.getElementById('modal-sheet').addEventListener('touchstart',function(e){_ts=e.touches[0].clientY;});
document.getElementById('modal-sheet').addEventListener('touchend',function(e){if(e.changedTouches[0].clientY-_ts>80)fecharModalBtn();});
</script>
</body>
</html>
